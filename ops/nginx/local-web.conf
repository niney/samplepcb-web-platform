# samplepcb-web-platform — 같은 도메인 통합 라우팅 (local-web.samplepcb.co.kr)
# nginx.conf 의 http{} 안에서 include 하거나 server 블록으로 사용.
# 구체적 location(/api, /app, /market)을 먼저, catch-all(/)을 마지막에 둔다.
#
# 이 파일은 repo 추적용 레퍼런스 스니펫. 실제 구동 config 는 D:\nginx\conf\nginx.conf (repo 밖)이며
# 아래 통합 호스트 블록이 그대로 반영돼 있다(라이브 /app 엔 X-Forwarded-Proto 한 줄 추가).
# 모노레포(/api·/app) 가동 중 — /api·/app·/ 3경로 모두 동작.
# ⚠ /market(재능마켓, 2026-07-08 신설)은 라이브 nginx 수동 반영 전까지 local-web 에서 404.
# 라이브엔 개발용 부가 호스트도 있음: local·local-www→5173(Vue 단독), local2·local3→5174·5175(worktree).

server {
    listen       443 ssl;
    server_name  local-web.samplepcb.co.kr;

    ssl_certificate     _wildcard.samplepcb.co.kr.pem;
    ssl_certificate_key _wildcard.samplepcb.co.kr-key.pem;

    client_max_body_size 100M;

    # 1) Node API (Fastify)
    location /api/ {
        proxy_pass http://127.0.0.1:3333;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 2) Vue 앱 — [개발] Vite dev + HMR
    location /app/ {
        proxy_pass http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
    }
    # 2') Vue 앱 — [운영] 빌드 static + SPA fallback  (위 /app 블록과 택1)
    # location /app/ {
    #     alias D:/work/workspace_other/samplepcb-web-platform/samplepcb-web-mono-app/apps/web/dist/;
    #     try_files $uri $uri/ /app/index.html;     # /app 내부로만 한정
    # }

    # 3) 재능마켓 앱 — [개발] Vite dev + HMR
    location /market/ {
        proxy_pass http://127.0.0.1:5176;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
    }
    # 3') 재능마켓 앱 — [운영] 빌드 static + SPA fallback  (위 /market 블록과 택1)
    # location /market/ {
    #     alias D:/work/workspace_other/samplepcb-web-platform/samplepcb-web-mono-app/apps/market/dist/;
    #     try_files $uri $uri/ /market/index.html;  # /market 내부로만 한정
    # }

    # 4) 나머지 전부 → PHP (그누보드/영카트)
    location / {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# http → https
server {
    listen 80;
    server_name local-web.samplepcb.co.kr;
    return 301 https://$host$request_uri;
}
